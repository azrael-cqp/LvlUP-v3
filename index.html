<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#0f172a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="mobile-web-app-capable" content="yes" />
  <title>Solo Leveling System</title>

  <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Crect width='180' height='180' fill='%230f172a'/%3E%3Ctext x='50%25' y='55%25' font-size='100' text-anchor='middle' fill='%23a78bfa' font-family='sans-serif' font-weight='bold'%3E%E2%9A%94%3C/text%3E%3C/svg%3E" />
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' fill='%230f172a'/%3E%3Ctext x='50%25' y='60%25' font-size='20' text-anchor='middle' fill='%23a78bfa'%3E%E2%9A%94%3C/text%3E%3C/svg%3E" />

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root {
      height: 100%; width: 100%;
      background: #0f172a; color: #e2e8f0;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      -webkit-font-smoothing: antialiased; overflow-x: hidden;
    }
    #loading {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: #0f172a; color: #a78bfa;
      font-family: monospace; gap: 16px; z-index: 9999;
    }
    #loading.hidden { display: none; }
    .pulse {
      width: 60px; height: 60px;
      border: 3px solid #1e293b; border-top-color: #a78bfa;
      border-radius: 50%; animation: spin 1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .label { font-size: 12px; letter-spacing: 2px; color: #64748b; }
    #error-display {
      position: fixed; inset: 0; display: none;
      flex-direction: column; padding: 20px;
      background: #0f172a; color: #fca5a5;
      font-family: monospace; font-size: 11px;
      z-index: 9999; overflow: auto;
    }
    #error-display.shown { display: flex; }
    #error-display h2 { color: #ef4444; margin-bottom: 12px; font-size: 14px; letter-spacing: 1px; }
    #error-display pre {
      white-space: pre-wrap; word-break: break-all;
      background: rgba(0,0,0,.5); padding: 12px;
      border-radius: 6px; border: 1px solid rgba(239,68,68,.3);
      max-height: 60vh; overflow: auto;
    }
    #error-display button {
      margin-top: 12px; padding: 10px;
      background: rgba(168,85,247,.2);
      border: 1px solid rgba(168,85,247,.5);
      border-radius: 6px; color: #c4b5fd;
      cursor: pointer; font-family: inherit;
    }
  </style>

</head>
<body>
  <div id="loading">
    <div class="pulse"></div>
    <div class="label">LOADING SYSTEM...</div>
  </div>

  <div id="error-display">
    <h2>WARNING APP CRASHED</h2>
    <pre id="error-message"></pre>
    <button onclick="location.reload()">RELOAD</button>
  </div>

  <div id="root"></div>

  <script>
    // Global error handlers - capture errors with full details
    var errorShown = false;
    function showError(msg) {
      if (errorShown) return;
      errorShown = true;
      var errorEl = document.getElementById('error-display');
      var errorMsg = document.getElementById('error-message');
      var loadingEl = document.getElementById('loading');
      if (errorEl && errorMsg) {
        errorMsg.textContent = msg;
        errorEl.classList.add('shown');
      }
      if (loadingEl) loadingEl.classList.add('hidden');
    }
    window.addEventListener('error', function(e) {
      var msg = (e.message || 'Script error') + '\n\n';
      msg += 'File: ' + (e.filename || 'unknown') + '\n';
      msg += 'Line: ' + (e.lineno || '?') + ', Col: ' + (e.colno || '?') + '\n\n';
      if (e.error && e.error.stack) msg += 'Stack:\n' + e.error.stack;
      showError(msg);
    });
    window.addEventListener('unhandledrejection', function(e) {
      var msg = 'Promise rejected:\n';
      if (e.reason) {
        msg += (e.reason.message || e.reason) + '\n';
        if (e.reason.stack) msg += '\n' + e.reason.stack;
      }
      showError(msg);
    });
  </script>

  <!-- Load React first -->

  <script crossorigin src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>

  <script crossorigin src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>

  <!-- Load Babel -->

  <script src="https://unpkg.com/@babel/standalone@7.24.7/babel.min.js"></script>

  <!-- Load and transpile app.jsx then mount -->

  <script>
    (function() {
      function loadAndMount() {
        if (typeof React === 'undefined' || typeof ReactDOM === 'undefined' || typeof Babel === 'undefined') {
          setTimeout(loadAndMount, 50);
          return;
        }
        
        // Fetch app.jsx as text, transpile, then execute
        fetch('app.jsx?v=' + Date.now())
          .then(function(r) {
            if (!r.ok) throw new Error('Failed to fetch app.jsx: ' + r.status);
            return r.text();
          })
          .then(function(jsxCode) {
            try {
              var compiled = Babel.transform(jsxCode, { presets: ['react'] }).code;
              // Execute in global scope so App is available
              var script = document.createElement('script');
              script.textContent = compiled + '\nwindow.__App = App;';
              document.head.appendChild(script);
              
              // Now mount
              if (typeof window.__App !== 'function') {
                throw new Error('App component not found after script execution');
              }
              var root = ReactDOM.createRoot(document.getElementById('root'));
              root.render(React.createElement(window.__App));
              
              var loader = document.getElementById('loading');
              if (loader) loader.classList.add('hidden');
            } catch (err) {
              showError('Compile/Run error:\n' + (err.message || err) + '\n\n' + (err.stack || ''));
            }
          })
          .catch(function(err) {
            showError('Failed to load app.jsx:\n' + (err.message || err));
          });
      }
      loadAndMount();
    })();
  </script>

</body>
</html>
