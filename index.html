<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#0f172a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="mobile-web-app-capable" content="yes" />
  <title>Solo Leveling System</title>

  <!-- PWA: Add to Home Screen -->
  <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Crect width='180' height='180' fill='%230f172a'/%3E%3Ctext x='50%25' y='55%25' font-size='100' text-anchor='middle' fill='%23a78bfa' font-family='sans-serif' font-weight='bold'%3E%E2%9A%94%3C/text%3E%3C/svg%3E" />
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' fill='%230f172a'/%3E%3Ctext x='50%25' y='60%25' font-size='20' text-anchor='middle' fill='%23a78bfa'%3E%E2%9A%94%3C/text%3E%3C/svg%3E" />

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root {
      height: 100%;
      width: 100%;
      background: #0f172a;
      color: #e2e8f0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      overflow-x: hidden;
    }
    #loading {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: #0f172a;
      color: #a78bfa;
      font-family: monospace;
      gap: 16px;
      z-index: 9999;
    }
    #loading.hidden { display: none; }
    .pulse {
      width: 60px; height: 60px;
      border: 3px solid #1e293b;
      border-top-color: #a78bfa;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .label { font-size: 12px; letter-spacing: 2px; color: #64748b; }
  </style>
</head>
<body>
  <div id="loading">
    <div class="pulse"></div>
    <div class="label">LOADING SYSTEM...</div>
  </div>

  <div id="root"></div>

  <!-- React 18 (Production builds, fast) -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

  <!-- Babel Standalone (for JSX transpilation in browser) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Application Code -->
  <script type="text/babel" data-presets="react" src="app.jsx"></script>

  <!-- Mount Application -->
  <script type="text/babel" data-presets="react">
    // Wait for App to be defined, then mount
    function mount() {
      if (typeof App === 'undefined') {
        setTimeout(mount, 50);
        return;
      }
      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(<App />);
      // Hide loader
      const loader = document.getElementById('loading');
      if (loader) loader.classList.add('hidden');
    }
    mount();
  </script>
</body>
</html>
